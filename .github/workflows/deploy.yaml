name: Deploy Web Statis to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'web-statis/**'
      - '.github/workflows/deploy.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./web-statis
          file: ./web-statis/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            echo "CONNECTED TO EC2"

            docker rm -f compro_2388010031 || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest

            docker run -d \
              --name compro_2388010031 \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest

            docker ps