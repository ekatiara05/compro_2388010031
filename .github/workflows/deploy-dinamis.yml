name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-dinamis/**'
      - '.github/workflows/deploy-dinamis.yml'

jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Path
        run: |
          echo "Lokasi saat ini:"
          pwd

          echo "Isi folder saat ini:"
          ls -F

          echo "Isi folder web-dinamis:"
          ls -F web-dinamis/

          echo "Isi folder static:"
          ls -F web-dinamis/static/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup old containers on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            docker rm -f compro_2388010031 || true
            cd /home/ubuntu/container-dinamis/web-dinamis 2>/dev/null && docker-compose down || true
            docker ps -a -q | xargs -r docker rm -f

      - name: Copy Compose file EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          source: "./web-dinamis/docker-compose.yml,web-dinamis/db_data/dbcompro.sql"
          target: "/home/ubuntu/container-dinamis"

      - name: Deploy Web Dinamis via SSH and run docker compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            cd /home/ubuntu/container-dinamis/web-dinamis

            docker-compose pull
            docker-compose up -d