name: Deploy Web Statis to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
    - name: SSH and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ubuntu
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          docker stop compro_2388010031 || true
          docker rm compro_2388010031 || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest
          docker run -d --name compro_2388010031 -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010031:latest